version: "3.8"

services:
  ug-videokeeper:
    image: python:3.11-slim
    container_name: ug-videokeeper
    restart: unless-stopped
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5433
      - DB_NAME=video
      - DB_USER=postgres
      - DB_PASSWORD=
      - SCAN_INTERVAL=3600
      - SYNC_MODE=bidirectional
      - DRY_RUN=false
      - LOG_LEVEL=INFO
    volumes:
      - 你的绿联媒体目录:/你的绿联媒体目录
      - ./:/app
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python main.py"
