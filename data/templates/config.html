<!DOCTYPE html><html lang="zh-CN"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>ug-videokeeper 配置</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;color:#333;padding:20px}
.wrap{max-width:720px;margin:0 auto}
h1{font-size:20px;font-weight:500;margin-bottom:20px}
.msg{padding:12px 16px;background:#d1fae5;color:#065f46;border-radius:8px;margin-bottom:16px;font-size:13px}
.sec{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px}
.sec h2{font-size:14px;font-weight:600;margin-bottom:14px;color:#444;border-bottom:1px solid #eee;padding-bottom:8px}
.row{display:flex;align-items:center;margin-bottom:10px}
.row label{width:180px;font-size:13px;color:#666;flex-shrink:0}
.row input,.row select{flex:1;padding:8px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;color:#333;background:#fff}
.row input:read-only{background:#f3f4f6;color:#999}
.row input[type=checkbox]{width:20px;height:20px;flex:none;margin-left:180px;cursor:pointer}
.row .hint{font-size:11px;color:#999;margin-left:8px}
.btn{padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer}
.btn:hover{background:#1d4ed8}
.nav{margin-top:16px}
.nav a{color:#2563eb;text-decoration:none;font-size:13px}
</style></head><body>
<div class="wrap">
<h1>&#9881; ug-videokeeper 配置</h1>
__MSG__

<form method="post" action="/config">
<div class="sec">
<h2>数据库（只读）</h2>
<div class="row"><label>主机</label><input readonly value="__DB_HOST_PORT__"></div>
<div class="row"><label>库名</label><input readonly value="__DB_NAME__"></div>
<div class="row"><label>用户</label><input readonly value="__DB_USER__"></div>
</div>

<div class="sec">
<h2>媒体库</h2>
<div class="row"><label>媒体库路径</label><input readonly value="__MEDIA_LIB_PATHS__"></div>
<div class="row"><label>同步目标路径</label><input name="target_path" value="__TARGET_PATH__" placeholder="如 /volume1/media/movie"></div>
</div>

<div class="sec">
<h2>同步</h2>
<div class="row"><label>扫描间隔（秒）</label><input name="scan_interval" type="number" value="__SCAN_INTERVAL__"></div>
<div class="row"><label>同步模式</label>
<select name="sync_mode">__SYNC_MODE_OPTIONS__</select></div>
<div class="row"><label>DRY_RUN</label>
<select name="dry_run">__DRY_RUN_OPTIONS__</select></div>
</div>

<div class="sec">
<h2>Watchdog</h2>
<div class="row"><label>启用 Watchdog</label>
<select name="watchdog_enabled">__WATCHDOG_OPTIONS__</select></div>
<div class="row"><label>防抖时间（秒）</label><input name="watchdog_debounce" type="number" step="0.1" value="__WATCHDOG_DEBOUNCE__"></div>
</div>

<div class="sec">
<h2>日志</h2>
<div class="row"><label>日志等级</label>
<select name="log_level">__LOG_LEVEL_OPTIONS__</select></div>
</div>

<div style="margin-top:16px">
<button type="submit" class="btn">保存配置</button>
</div>
</form>

<div class="nav">
<a href="/">&#8592; 返回报告列表</a>
</div>
</div></body></html>
